<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a472a; }
        .card { background: white; border-radius: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; }
        button { background: #ffd700; font-weight: bold; cursor: pointer; }
        .resultado { background: #e8f5e9; padding: 10px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="card">
    <h1>🏆 MUNDIAL 2026</h1>
    <h2>📝 Registro</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="celular" placeholder="Celular">
    <button id="btnRegistrar">🎯 Registrarse</button>
    <div id="resultado" class="resultado"></div>
</div>

<script>
    // ============ CONFIGURACIÓN ============
    const SUPABASE_URL = 'https://nymupwfyqnjebnkxskik.supabase.co';
    // ⚠️ PON AQUÍ TU CLAVE ANÓNIMA (empieza con eyJ) - NO la secreta!
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55bXVwd2Z5cW5qZWJua3hza2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzM5OTYsImV4cCI6MjA5Njg0OTk5Nn0.TXyMksAdY1XxnbRR5Thx8yLsBcZg7bpahHC9om3VFF4';
    
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Registro
    async function registrar() {
        const nombre = document.getElementById('nombre').value;
        const celular = document.getElementById('celular').value;
        const resultado = document.getElementById('resultado');
        
        if (!nombre || !celular) {
            resultado.innerHTML = '❌ Completa nombre y celular';
            return;
        }
        
        resultado.innerHTML = '🔄 Registrando...';
        
        const { error } = await db.from('usuarios').insert({
            id: Date.now().toString(),
            nombre: nombre,
            celular: celular,
            saldo: 0,
            fecha_registro: new Date()
        });
        
        if (error) {
            resultado.innerHTML = '❌ Error: ' + error.message;
        } else {
            resultado.innerHTML = '✅ ¡Registro exitoso! Bienvenido ' + nombre;
            localStorage.setItem('usuario', JSON.stringify({ nombre: nombre }));
        }
    }
    
    document.getElementById('btnRegistrar').onclick = registrar;
</script>
</body>
</html>
