function partidoCerrado(fecha,hora){return new Date()>new Date(fecha+'T'+hora+':00-05:00')}
function actualizarCard(){if(usuario){document.getElementById('usuarioCard').style.display='block';document.getElementById('usuarioCard').innerHTML=`👤 ${usuario.nombre}<br>💰 $${usuario.saldo||0}`;document.getElementById('saldo').innerHTML=`$${usuario.saldo||0}`}}

async function registrar(){
    const nombre=document.getElementById('nombre').value,cel=document.getElementById('celular').value;
    if(!nombre||!cel){alert('Complete datos');return}
    const id=Date.now().toString();
    const{error}=await db.from('usuarios').insert({id,nombre:nombre,celular:cel,saldo:0,fecha_registro:new Date()});
    if(error){alert('Error:'+error.message);return}
    usuario={id,nombre,saldo:0};localStorage.setItem('user',JSON.stringify(usuario));
    document.getElementById('registroPanel').classList.add('oculto');document.getElementById('mainPanel').classList.remove('oculto');
    actualizarCard();await cargarTodo();
    alert(`✅ Bienvenido ${nombre}`);
}

async function cargarTodo(){
    await cargarEstadisticas();await cargarPartidos();await cargarMisApuestas();
}

async function cargarEstadisticas(){
    const{data:a}=await db.from('apuestas').select('monto');const total=a?.reduce((s,x)=>s+x.monto,0)||0;
    document.getElementById('pozoTotal').innerHTML=`$${total}`;
    const{count:j}=await db.from('usuarios').select('*',{count:'exact',head:true});document.getElementById('totalJugadores').innerText=j||0;
    document.getElementById('totalApuestas').innerText=a?.length||0;
    const{data:g}=await db.from('apuestas').select('nombre_usuario,ganancia_recibida').eq('estado','ganada');
    const rank=new Map();g?.forEach(x=>rank.set(x.nombre_usuario,(rank.get(x.nombre_usuario)||0)+(x.ganancia_recibida||0)));
    const sorted=Array.from(rank.entries()).sort((a,b)=>b[1]-a[1]).slice(0,10);
    document.getElementById('ranking').innerHTML=sorted.length?sorted.map((r,i)=>`<div class="ranking-item"><span>${i+1}. ${r[0]}</span><span>💰 $${r[1]}</span></div>`).join(''):'<p>Aún no hay ganadores';
}

async function cargarPartidos(){
    const{data:existentes}=await db.from('partidos').select('id');
    if(!existentes||existentes.length!==72){await db.from('partidos').delete().neq('id',0);for(const p of partidos)await db.from('partidos').insert(p);}
    const{data:p}=await db.from('partidos').select('*').order('fecha');
    const grid=document.getElementById('partidosGrid');
    grid.innerHTML=p.map(m=>{const cerrado=m.estado==='cerrado'||partidoCerrado(m.fecha,m.hora);const esCol=m.local==='Colombia'||m.visitante==='Colombia';
        return`<div class="partido-card ${cerrado?'cerrado':''}"><div><strong>🏆 ${m.local} vs ${m.visitante}</strong>${esCol?'<span class="badge">🇨🇴 COL</span>':''}</div>
        <div class="fecha-hora">📅 ${m.fecha} 🕐 ${m.hora}<span class="estado-partido ${cerrado?'cerrado':'abierto'}">${cerrado?'🔒 Cerrado':'📢 Abierto'}</span></div>
        <div>${m.grupo}</div><div class="marcador-inputs"><input type="number" id="gl_${m.id}" placeholder="${m.local}" ${cerrado?'disabled':''}>
        <input type="number" id="gv_${m.id}" placeholder="${m.visitante}" ${cerrado?'disabled':''}></div>
        ${!cerrado?`<button onclick="apostar(${m.id},'${m.local}','${m.visitante}')">⚡ Apostar $5,000</button>`:`<button disabled>⏳ Finalizado</button>`}</div>`}).join('');
}

window.apostar=async(id,local,visitante)=>{
    if(!usuario){alert('Regístrate');return}
    const{data:partido}=await db.from('partidos').select('estado,fecha,hora').eq('id',id).single();
    if(partido.estado==='cerrado'||partidoCerrado(partido.fecha,partido.hora)){alert('Partido cerrado');return}
    const gL=parseInt(document.getElementById(`gl_${id}`).value),gV=parseInt(document.getElementById(`gv_${id}`).value);
    if(isNaN(gL)||isNaN(gV)){alert('Ingresa marcador');return}
    if(usuario.saldo<5000){alert('Saldo insuficiente');return}
    const nuevo=usuario.saldo-5000;await db.from('usuarios').update({saldo:nuevo}).eq('id',usuario.id);usuario.saldo=nuevo;
    await db.from('apuestas').insert({id:Date.now().toString(),usuario_id:usuario.id,nombre_usuario:usuario.nombre,partido:`${local} vs ${visitante}`,partido_id:id,marcador_local:gL,marcador_visitante:gV,monto:5000,estado:'pendiente',fecha_apuesta:new Date()});
    actualizarCard();await cargarMisApuestas();await cargarEstadisticas();
    alert(`✅ Apuesta ${gL}-${gV}`);document.getElementById(`gl_${id}`).value='';document.getElementById(`gv_${id}`).value='';
}

async function cargarMisApuestas(){
    if(!usuario)return;
    const{data}=await db.from('apuestas').select('*').eq('usuario_id',usuario.id).order('fecha_apuesta',{ascending:false});
    const cont=document.getElementById('misApuestas');
    if(!data||data.length===0){cont.innerHTML='<p>Aún no has apostado</p>';return}
    cont.innerHTML=data.map(a=>`<div class="apuesta-item"><div><strong>${a.partido}</strong><br>${a.marcador_local}-${a.marcador_visitante} | $${a.monto}</div><div>${a.estado==='pendiente'?'⏳':a.estado==='ganada'?'✅':'❌'}</div></div>`).join('');
}

if(!s||s.length===0){cont.innerHTML='<p>✅ Sin solicitudes</p>';return}
let html='';for(const r of s){const{data:u}=await db.from('usuarios').select('nombre').eq('id',r.usuario_id).single();
html+=`<div style="background:#2a5a3a;padding:10px;margin:8px 0;border-radius:8px"><div>👤 ${u?.nombre||'?'}</div><div>💰 $${r.monto}</div><button onclick="aprobar('${r.id}','${r.usuario_id}',${r.monto})" style="background:#4caf50;color:white;margin:5px 0">✅ Aprobar</button>
<button onclick="rechazar('${r.id}')" style="background:#ff4444;color:white">❌ Rechazar</button></div>`;}
cont.innerHTML=html;}

window.aprobar=async(id,uid,monto)=>{if(!confirm(`¿Aprobar $${monto}?`))return;const{data:u}=await db.from('usuarios').select('saldo').eq('id',uid).single();await db.from('usuarios').update({saldo:(u?.saldo||0)+monto}).eq('id',uid);await db.from('recargas').update({estado:'confirmado'}).eq('id',id);alert('✅ Aprobada');cargarRecargas();if(usuario?.id===uid){usuario.saldo=(u?.saldo||0)+monto;actualizarCard();}};
window.rechazar=async(id)=>{if(confirm('¿Rechazar?')){await db.from('recargas').update({estado:'rechazado'}).eq('id',id);cargarRecargas();}};

function mostrarRecarga(){document.getElementById('datosPago').innerHTML=document.getElementById('medioPago').value==='Nequi'?'🔑 Nequi: 0091030441':'🏦 Bancolombia: 26269998309';document.getElementById('modalRecarga').style.display='flex';}
async function enviarRecarga(){const m=parseInt(document.getElementById('montoRecarga').value);if(!m||m<5000||m%5000!==0){alert('Mínimo $5,000 múltiplo de 5,000');return}
await db.from('recargas').insert({id:Date.now().toString(),usuario_id:usuario.id,monto:m,medio_pago:document.getElementById('medioPago').value,estado:'verificando',fecha:new Date()});
alert('✅ Solicitud enviada');document.getElementById('modalRecarga').style.display='none';}

let adminAbierto=false;
document.getElementById('adminBtn').onclick=()=>{document.getElementById('modalPass').style.display='flex'};
document.getElementById('btnLogin').onclick=async()=>{if(document.getElementById('adminPass').value==='admin123'){document.getElementById('modalPass').style.display='none';document.getElementById('adminPanel').style.display='block';adminAbierto=true;await cargarRecargas();}else alert('❌ Contraseña incorrecta')};
document.getElementById('btnCerrarAdmin').onclick=()=>{document.getElementById('adminPanel').style.display='none'};
document.getElementById('btnActualizar').onclick=cargarRecargas;
document.getElementById('btnVerPozo').onclick=async()=>{const{data:a}=await db.from('apuestas').select('monto');alert(`💰 POZO: $${(a?.reduce((s,x)=>s+x.monto,0)||0)}`)};
document.getElementById('btnCancelPass').onclick=()=>document.getElementById('modalPass').style.display='none';
document.getElementById('btnRegistrar').onclick=registrar;
document.getElementById('btnRecargar').onclick=mostrarRecarga;
document.getElementById('btnEnviarRecarga').onclick=enviarRecarga;
document.getElementById('btnCerrarRecarga').onclick=()=>document.getElementById('modalRecarga').style.display='none';

window.onload=async()=>{const guardado=localStorage.getItem('user');if(guardado){usuario=JSON.parse(guardado);document.getElementById('registroPanel').classList.add('oculto');document.getElementById('mainPanel').classList.remove('oculto');actualizarCard();await cargarTodo();}};
</script>
