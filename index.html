<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba - Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a472a; }
        .card { background: white; border-radius: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; }
        button { background: #ffd700; font-weight: bold; cursor: pointer; }
        .resultado { background: #e8f5e9; padding: 10px; margin-top: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🏆 MUNDIAL 2026</h1>
    
    <h2>📝 Registro</h2>
    <input type="text" id="nombre" placeholder="Nombre" value="prueba">
    <input type="text" id="celular" placeholder="Celular" value="123456">
    <button id="btnRegistrar">🎯 Registrarse</button>
    
    <div id="resultado" class="resultado"></div>
</div>

<script>
    console.log("✅ Script cargado correctamente");
    
    // Configuración de Supabase
    const SUPABASE_URL = 'https://nymupwfyqnjebnkxskik.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0Bxd_EI0C1EeVdFjdhg3gA_yfbxeWLJ';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    console.log("✅ Supabase inicializado");
    
    // Función de registro
    async function registrarUsuario() {
        console.log("🔵 Botón clickeado - Ejecutando registro...");
        
        const nombre = document.getElementById('nombre').value;
        const celular = document.getElementById('celular').value;
        const resultadoDiv = document.getElementById('resultado');
        
        resultadoDiv.style.display = 'block';
        resultadoDiv.innerHTML = '🔄 Registrando...';
        
        if (!nombre || !celular) {
            resultadoDiv.innerHTML = '❌ Completa nombre y celular';
            return;
        }
        
        const usuarioId = Date.now().toString();
        
        try {
            console.log("Intentando insertar en Supabase...");
            
            const { data, error } = await supabase
                .from('usuarios')
                .insert({
                    id: usuarioId,
                    nombre: nombre,
                    celular: celular,
                    saldo: 0,
                    fecha_registro: new Date()
                });
            
            if (error) {
                console.error("Error de Supabase:", error);
                resultadoDiv.innerHTML = '❌ Error: ' + error.message;
                return;
            }
            
            console.log("✅ Registro exitoso:", data);
            resultadoDiv.innerHTML = '✅ ¡Registro exitoso! Bienvenido ' + nombre;
            
            // Guardar en localStorage
            const usuario = { id: usuarioId, nombre: nombre, saldo: 0 };
            localStorage.setItem('usuario', JSON.stringify(usuario));
            
            setTimeout(() => {
                alert('✅ Registro exitoso! Ahora recarga la página para continuar.');
            }, 500);
            
        } catch (err) {
            console.error("Error:", err);
            resultadoDiv.innerHTML = '❌ Error: ' + err.message;
        }
    }
    
    // Asignar evento al botón
    const boton = document.getElementById('btnRegistrar');
    if (boton) {
        boton.onclick = registrarUsuario;
        console.log("✅ Evento asignado al botón");
    } else {
        console.error("❌ No se encontró el botón");
    }
    
    // Verificar la tabla en Supabase
    async function verificarTabla() {
        console.log("Verificando tabla usuarios...");
        const { data, error } = await supabase.from('usuarios').select('count');
        if (error) {
            console.error("Error al verificar tabla:", error);
        } else {
            console.log("✅ Tabla usuarios existe");
        }
    }
    
    verificarTabla();
</script>
</body>
</html>
